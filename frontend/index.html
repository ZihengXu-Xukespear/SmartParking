<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-banner">
                <h1>Smart Parking</h1>
                <p>智慧停车管理系统<br>高效管理 · 智能识别 · 数据可视化</p>
            </div>
            <div class="auth-form">
                <h2>用户登录</h2>
                <p class="subtitle">请输入您的账户信息</p>
                <div id="alert-box"></div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button class="btn btn-primary btn-block btn-lg" onclick="handleLogin()" id="login-btn">登 录</button>
                <div class="auth-footer">
                    还没有账号？<a href="/register.html">立即注册</a>
                    &nbsp;|&nbsp;
                    <a href="/init.html">系统初始化</a>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
