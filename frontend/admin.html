<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理页面 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
            <div class="sidebar-nav">
                <a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
                <a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
                <a class="nav-item active" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
                <a class="nav-item" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
                <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1>管理页面</h1>
                <p>用户管理、计费规则和月卡管理</p>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('users')">用户管理</div>
                <div class="tab" onclick="switchTab('billing')">计费规则</div>
                <div class="tab" onclick="switchTab('passes')">月卡管理</div>
            </div>

            <div id="alert-box"></div>

            <!-- Users Tab -->
            <div id="tab-users">
                <div class="card">
                    <div class="card-title">
                        管理员信息
                        <button class="btn btn-primary btn-sm" style="float:right" onclick="showModal('user-modal')">添加用户</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>手机号</th>
                                    <th>真实姓名</th>
                                    <th>角色</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-table">
                                <tr><td colspan="7" class="loading">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Billing Tab -->
            <div id="tab-billing" class="hidden">
                <div class="card">
                    <div class="card-title">计费规则</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>规则名称</th>
                                    <th>类型</th>
                                    <th>免费时长(分)</th>
                                    <th>费率(元/时)</th>
                                    <th>日封顶(元)</th>
                                    <th>描述</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="billing-table">
                                <tr><td colspan="8" class="loading">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Passes Tab -->
            <div id="tab-passes" class="hidden">
                <div class="card">
                    <div class="card-title">
                        月卡管理
                        <button class="btn btn-primary btn-sm" style="float:right" onclick="showModal('pass-modal')">添加月卡</button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>车牌号</th>
                                    <th>类型</th>
                                    <th>开始日期</th>
                                    <th>结束日期</th>
                                    <th>费用</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="passes-table">
                                <tr><td colspan="8" class="loading">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="user-modal-title">添加用户</h3>
                <button class="modal-close" onclick="hideModal('user-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-user-id">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="modal-username" class="form-control" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="modal-password" class="form-control" placeholder="请输入密码">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="modal-telephone" class="form-control" maxlength="11">
                    </div>
                    <div class="form-group">
                        <label>真实姓名</label>
                        <input type="text" id="modal-truename" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>角色</label>
                    <select id="modal-role" class="form-control">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="hideModal('user-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Pass Modal -->
    <div class="modal-overlay" id="pass-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>添加月卡</h3>
                <button class="modal-close" onclick="hideModal('pass-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>车牌号</label>
                    <input type="text" id="pass-plate" class="form-control" placeholder="例: 京A12345">
                </div>
                <div class="form-group">
                    <label>卡类型</label>
                    <select id="pass-type" class="form-control">
                        <option value="月卡">月卡</option>
                        <option value="季卡">季卡</option>
                        <option value="年卡">年卡</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="pass-start" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="pass-end" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>费用 (元)</label>
                    <input type="number" id="pass-fee" class="form-control" value="200" step="10">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="hideModal('pass-modal')">取消</button>
                <button class="btn btn-primary" onclick="savePass()">添加</button>
            </div>
        </div>
    </div>

    <!-- Billing Edit Modal -->
    <div class="modal-overlay" id="billing-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑计费规则</h3>
                <button class="modal-close" onclick="hideModal('billing-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-billing-id">
                <div class="form-group">
                    <label>规则名称</label>
                    <input type="text" id="billing-name" class="form-control">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>免费时长(分钟)</label>
                        <input type="number" id="billing-free" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>费率(元/时)</label>
                        <input type="number" id="billing-rate" class="form-control" step="0.5">
                    </div>
                </div>
                <div class="form-group">
                    <label>每日封顶(元)</label>
                    <input type="number" id="billing-max" class="form-control" step="1">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <input type="text" id="billing-desc" class="form-control">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="billing-active" checked> 启用此规则
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="hideModal('billing-modal')">取消</button>
                <button class="btn btn-primary" onclick="saveBillingRule()">保存</button>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
