<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主面板 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <h2>Smart Parking</h2>
                <p>智慧停车管理系统</p>
            </div>
            <div class="sidebar-nav">
                <a class="nav-item active" id="nav-dashboard" href="/dashboard.html">
                    <span class="icon">&#9776;</span> 主面板
                </a>
                <a class="nav-item" id="nav-vehicles" href="/vehicles.html">
                    <span class="icon">&#128663;</span> 车辆信息
                </a>
                <a class="nav-item" id="nav-admin" href="/admin.html">
                    <span class="icon">&#128100;</span> 管理页面
                </a>
                <a class="nav-item" id="nav-reservation" href="/reservation.html">
                    <span class="icon">&#128197;</span> 预约管理
                </a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                    <div>
                        <div class="user-name">用户</div>
                        <div class="user-role">普通用户</div>
                    </div>
                </div>
                <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="page-header">
                <h1>主面板</h1>
                <p>停车场实时状态与管理操作</p>
            </div>

            <!-- Stats Cards -->
            <div class="stat-cards">
                <div class="stat-card primary">
                    <div class="label">总车位</div>
                    <div class="value" id="stat-total">-</div>
                </div>
                <div class="stat-card danger">
                    <div class="label">已占用</div>
                    <div class="value" id="stat-occupied">-</div>
                </div>
                <div class="stat-card warning">
                    <div class="label">已预约</div>
                    <div class="value" id="stat-reserved">-</div>
                </div>
                <div class="stat-card success">
                    <div class="label">剩余车位</div>
                    <div class="value" id="stat-available">-</div>
                </div>
            </div>

            <div class="row">
                <!-- Left: Check-in/Check-out -->
                <div class="col-2">
                    <div class="card">
                        <div class="card-title">车辆入库 / 出库</div>
                        <div id="vehicle-alert"></div>
                        <div class="form-group">
                            <label>车牌号</label>
                            <div class="plate-input-group">
                                <input type="text" id="plate-input" class="form-control" placeholder="例: 京A12345" maxlength="10">
                                <button class="btn btn-default btn-sm" onclick="handlePlateRecognize()" title="车牌识别(预留)">识别</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>计费方式</label>
                            <select id="billing-type" class="form-control">
                                <option value="standard">标准计费</option>
                                <option value="tiered">阶梯计费</option>
                                <option value="member">会员计费</option>
                                <option value="special">特殊车辆(免费)</option>
                            </select>
                        </div>
                        <div class="actions mt-2">
                            <button class="btn btn-primary" onclick="handleCheckIn()">车辆入库</button>
                            <button class="btn btn-danger" onclick="handleCheckOut()">车辆出库</button>
                        </div>
                    </div>

                    <!-- Recent Records -->
                    <div class="card">
                        <div class="card-title">最近记录</div>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>车牌号</th>
                                        <th>入库时间</th>
                                        <th>出库时间</th>
                                        <th>费用</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-records">
                                    <tr><td colspan="5" class="loading">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Right: Pie Chart + Settings -->
                <div class="col-1">
                    <div class="card">
                        <div class="card-title">车位占用情况</div>
                        <div class="chart-container" id="pie-chart"></div>
                    </div>

                    <div class="card">
                        <div class="card-title">停车场信息</div>
                        <div class="form-group">
                            <label>停车场名称</label>
                            <input type="text" id="parking-name" class="form-control" readonly>
                        </div>
                        <div class="form-group">
                            <label>每小时费率 (元)</label>
                            <input type="number" id="parking-fee" class="form-control" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>总车位数</label>
                            <input type="number" id="parking-capacity" class="form-control">
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="updateSettings()">保存设置</button>
                    </div>

                    <!-- Plate recognition stub -->
                    <div class="card">
                        <div class="card-title">车牌识别 <span class="badge badge-warning">预留</span></div>
                        <p style="color:#666;font-size:13px;margin-bottom:12px">OpenCV/EasyPR 接口已预留，集成后可自动识别车牌</p>
                        <div id="plate-result"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
