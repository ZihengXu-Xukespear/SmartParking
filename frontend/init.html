<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统初始化 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Not initialized: show init form -->
    <div class="init-page" id="page-init">
        <div class="init-container">
            <h2>Smart Parking 系统初始化</h2>
            <p class="subtitle">首次使用请配置数据库连接和停车场信息</p>
            <div id="alert-box"></div>

            <div class="card">
                <div class="card-title">数据库连接</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>主机地址</label>
                        <input type="text" id="host" class="form-control" value="localhost">
                    </div>
                    <div class="form-group">
                        <label>端口</label>
                        <input type="number" id="port" class="form-control" value="3306">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>数据库名</label>
                        <input type="text" id="database" class="form-control" value="smart_parking">
                    </div>
                    <div class="form-group">
                        <label>服务端口</label>
                        <input type="number" id="server_port" class="form-control" value="8080">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>数据库用户名</label>
                        <input type="text" id="user" class="form-control" value="root">
                    </div>
                    <div class="form-group">
                        <label>数据库密码</label>
                        <input type="password" id="password" class="form-control" placeholder="请输入MySQL密码">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">停车场配置</div>
                <div class="form-group">
                    <label>停车场名称</label>
                    <input type="text" id="parking_name" class="form-control" value="智慧停车场">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>每小时费率 (元)</label>
                        <input type="number" id="fee" class="form-control" value="5.00" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>总车位数</label>
                        <input type="number" id="capacity" class="form-control" value="100">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary btn-block btn-lg" onclick="handleInit()" id="init-btn">初始化系统</button>
        </div>
    </div>

    <!-- Already initialized: show info + re-init option -->
    <div class="init-page" id="page-reinit" style="display:none">
        <div class="init-container">
            <h2>系统已初始化</h2>
            <p class="subtitle" id="reinit-parking-name"></p>
            <div id="reinit-alert-box"></div>

            <div class="card" style="text-align:center;padding:30px">
                <p style="font-size:16px;margin-bottom:20px">系统已完成初始化，正常使用请前往登录</p>
                <a href="/index.html" class="btn btn-primary btn-lg" style="margin-bottom:30px">前往登录</a>

                <hr style="margin:20px 0;border-color:#eee">

                <p style="color:#ff4d4f;font-weight:bold;margin-bottom:16px">
                    ⚠ 重新初始化将覆盖现有数据库
                </p>
                <p style="font-size:13px;color:#666;margin-bottom:16px">
                    此操作需要 root 管理员权限验证
                </p>

                <div class="form-group">
                    <label>Root 用户名</label>
                    <input type="text" id="reinit-root-user" class="form-control" value="root" style="text-align:center;width:200px;margin:0 auto">
                </div>
                <div class="form-group">
                    <label>Root 密码</label>
                    <input type="password" id="reinit-root-pass" class="form-control" placeholder="请输入 root 密码" style="text-align:center;width:200px;margin:0 auto">
                </div>
                <button class="btn btn-danger btn-sm" onclick="handleRootLogin()" id="reinit-login-btn">Root 验证</button>
                <div id="reinit-form-area" style="display:none;margin-top:20px">
                    <p style="color:#52c41a;font-weight:bold;margin-bottom:12px">验证通过</p>
                    <button class="btn btn-danger" onclick="handleForceReinit()" id="reinit-force-btn">
                        确认重新初始化（将清空所有数据）
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/init.js"></script>
</body>
</html>
