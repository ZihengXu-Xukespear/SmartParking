<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
            <div class="sidebar-nav">
                <a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
                <a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
                <a class="nav-item" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
                <a class="nav-item active" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
                <a class="nav-item" id="nav-profile" href="/profile.html"><span class="icon">&#128101;</span> 个人中心</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
                <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1>预约管理</h1>
                <p>预约车位，<span id="expire-hint">30</span>分钟内到达有效</p>
            </div>

            <div id="alert-box"></div>

            <!-- Create Reservation -->
            <div class="card">
                <div class="card-title">预约车位</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>车牌号</label>
                        <input type="text" id="res-plate" class="form-control" placeholder="例: 京A12345">
                    </div>
                    <div class="form-group">
                        <label>停车场</label>
                        <input type="text" id="res-parking" class="form-control" readonly>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="createReservation()">立即预约</button>
            </div>

            <!-- Status Card -->
            <div class="stat-cards">
                <div class="stat-card primary">
                    <div class="label">总车位</div>
                    <div class="value" id="stat-total">-</div>
                </div>
                <div class="stat-card danger">
                    <div class="label">已占用</div>
                    <div class="value" id="stat-occupied">-</div>
                </div>
                <div class="stat-card warning">
                    <div class="label">已预约</div>
                    <div class="value" id="stat-reserved">-</div>
                </div>
                <div class="stat-card success">
                    <div class="label">可预约</div>
                    <div class="value" id="stat-available">-</div>
                </div>
            </div>

            <!-- Reservations Table -->
            <div class="card">
                <div class="card-title">预约列表</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>车牌号</th>
                                <th>停车场</th>
                                <th>预约时间</th>
                                <th>剩余有效时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reservations-table">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const user = checkAuth();
        if (user) initSidebar();

        // Load parking status (including expire minutes config)
        async function loadStatus() {
            const res = await get('/api/parking/status');
            if (!res || !res.ok) return;
            const d = res.data;
            document.getElementById('stat-total').textContent = d.P_total_count;
            document.getElementById('stat-occupied').textContent = d.P_current_count;
            document.getElementById('stat-reserved').textContent = d.P_reserve_count;
            document.getElementById('stat-available').textContent = d.P_available_count;
            document.getElementById('res-parking').value = d.P_name;
            const expireMin = d.notice_expire_minutes || 30;
            document.getElementById('expire-hint').textContent = expireMin;
            window._expireMinutes = expireMin;
        }

        // Load reservations
        async function loadReservations() {
            const res = await get('/api/reservation/list');
            const tbody = document.getElementById('reservations-table');
            if (!res || !res.ok) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">加载失败</td></tr>';
                return;
            }
            const list = res.data.reservations || [];
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">暂无预约</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(r => {
                const created = new Date(r.created_at.replace(' ', 'T'));
                const expireMin = window._expireMinutes || 30;
                const expire = new Date(created.getTime() + expireMin * 60000);
                const now = new Date();
                const remain = Math.max(0, Math.floor((expire - now) / 60000));
                return `
                    <tr>
                        <td>${r.id}</td>
                        <td><strong>${r.license_plate}</strong></td>
                        <td>${r.P_name}</td>
                        <td>${formatDateTime(r.created_at)}</td>
                        <td><span class="badge ${remain > 0 ? 'badge-success' : 'badge-danger'}">${remain > 0 ? remain + ' 分钟' : '已过期'}</span></td>
                        <td><button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id})">取消</button></td>
                    </tr>
                `;
            }).join('');
        }

        // Create reservation
        async function createReservation() {
            const plate = document.getElementById('res-plate').value.trim();
            if (!plate) { showError('alert-box', '请输入车牌号'); return; }

            // Validate plate format
            const vres = await post('/api/plate/validate', { license_plate: plate });
            if (vres && vres.ok && !vres.data.valid) {
                showError('alert-box', vres.data.message || '车牌号格式不正确');
                return;
            }

            if (!confirm('预约将从余额中预付首小时费用，预约不可退款。\n\n确定预约车牌 ' + plate + ' 吗？')) return;

            const res = await post('/api/reservation/create', { license_plate: plate });
            if (res && res.ok) {
                const expireMin = window._expireMinutes || 30;
                showSuccess('alert-box', '预约成功！请在' + expireMin + '分钟内到达，预付费用不退。');
                document.getElementById('res-plate').value = '';
                loadReservations();
                loadStatus();
            } else {
                showError('alert-box', res?.data?.error || '预约失败');
            }
        }

        // Cancel reservation
        async function cancelReservation(id) {
            if (!confirm('确定要取消此预约吗？\n\n预付费用将不予退还。')) return;
            const res = await del('/api/reservation/' + id);
            if (res && res.ok) {
                showSuccess('alert-box', '预约已取消（预付不退）');
                loadReservations();
                loadStatus();
            } else {
                showError('alert-box', res?.data?.error || '取消失败');
            }
        }

        // Enter key
        document.getElementById('res-plate')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') createReservation();
        });

        // Init
        loadStatus();
        loadReservations();

        // Auto refresh
        setInterval(() => { loadStatus(); loadReservations(); }, 10000);
    </script>
</body>
</html>
