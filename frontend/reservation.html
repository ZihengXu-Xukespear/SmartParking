<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - Smart Parking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
            <div class="sidebar-nav">
                <a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
                <a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
                <a class="nav-item" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
                <a class="nav-item active" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
                <a class="nav-item" id="nav-profile" href="/profile.html"><span class="icon">&#128101;</span> 个人中心</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
                <button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h1>预约管理</h1>
                <p>预约车位，<span id="expire-hint">30</span>分钟内到达有效</p>
            </div>

            <div id="alert-box"></div>

            <!-- Create Reservation -->
            <div class="card">
                <div class="card-title">预约车位</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>车牌号</label>
                        <input type="text" id="res-plate" class="form-control" placeholder="例: 京A12345">
                    </div>
                    <div class="form-group">
                        <label>停车场</label>
                        <input type="text" id="res-parking" class="form-control" readonly>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="createReservation()">立即预约</button>
            </div>

            <!-- Status Card -->
            <div class="stat-cards">
                <div class="stat-card primary">
                    <div class="label">总车位</div>
                    <div class="value" id="stat-total">-</div>
                </div>
                <div class="stat-card danger">
                    <div class="label">已占用</div>
                    <div class="value" id="stat-occupied">-</div>
                </div>
                <div class="stat-card warning">
                    <div class="label">已预约</div>
                    <div class="value" id="stat-reserved">-</div>
                </div>
                <div class="stat-card success">
                    <div class="label">可预约</div>
                    <div class="value" id="stat-available">-</div>
                </div>
            </div>

            <!-- Reservation Tabs -->
            <div class="tabs" style="margin-top:16px">
                <div class="tab active" onclick="switchReservationTab('active',event)">当前预约</div>
                <div class="tab" onclick="switchReservationTab('history',event)">历史记录</div>
            </div>

            <!-- Active Reservations -->
            <div class="card" id="tab-active-reservations">
                <div class="card-title">预约列表</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>车牌号</th>
                                <th>停车场</th>
                                <th>预约时间</th>
                                <th>剩余有效时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reservations-table">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- History Reservations -->
            <div class="card hidden" id="tab-history-reservations">
                <div class="card-title">历史记录</div>
                <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
                    <label style="font-size:13px">开始:</label>
                    <input type="date" id="hist-start" class="form-control" style="width:150px">
                    <label style="font-size:13px">结束:</label>
                    <input type="date" id="hist-end" class="form-control" style="width:150px">
                    <button class="btn btn-primary btn-sm" onclick="loadHistory()">查询</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>车牌号</th>
                                <th>停车场</th>
                                <th>状态</th>
                                <th>预付</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="history-table">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const user = checkAuth();
        if (user) initSidebar();

        // Load parking status (including expire minutes config)
        async function loadStatus() {
            const res = await get('/api/parking/status');
            if (!res || !res.ok) return;
            const d = res.data;
            document.getElementById('stat-total').textContent = d.P_total_count;
            document.getElementById('stat-occupied').textContent = d.P_current_count;
            document.getElementById('stat-reserved').textContent = d.P_reserve_count;
            document.getElementById('stat-available').textContent = d.P_available_count;
            document.getElementById('res-parking').value = d.P_name;
            const expireMin = d.notice_expire_minutes || 30;
            document.getElementById('expire-hint').textContent = expireMin;
            window._expireMinutes = expireMin;
        }

        // Load reservations
        async function loadReservations() {
            const res = await get('/api/reservation/list');
            const tbody = document.getElementById('reservations-table');
            if (!res || !res.ok) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">加载失败</td></tr>';
                return;
            }
            const list = res.data.reservations || [];
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">暂无预约</td></tr>';
                return;
            }
            tbody.innerHTML = list.map(r => {
                const created = new Date(r.created_at.replace(' ', 'T'));
                const expireMin = window._expireMinutes || 30;
                const expire = new Date(created.getTime() + expireMin * 60000);
                const now = new Date();
                const remain = Math.max(0, Math.floor((expire - now) / 60000));
                return `
                    <tr>
                        <td>${r.id}</td>
                        <td><strong>${r.license_plate}</strong></td>
                        <td>${r.P_name}</td>
                        <td>${formatDateTime(r.created_at)}</td>
                        <td><span class="badge ${remain > 0 ? 'badge-success' : 'badge-danger'}">${remain > 0 ? remain + ' 分钟' : '已过期'}</span></td>
                        <td><button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id})">取消</button></td>
                    </tr>
                `;
            }).join('');
        }

        // Create reservation
        async function createReservation() {
            const plate = document.getElementById('res-plate').value.trim();
            if (!plate) { showError('alert-box', '请输入车牌号'); return; }

            // Validate plate format
            const vres = await post('/api/plate/validate', { license_plate: plate });
            if (vres && vres.ok && !vres.data.valid) {
                showError('alert-box', vres.data.message || '车牌号格式不正确');
                return;
            }

            if (!confirm('预约将从余额中预付首小时费用，预约不可退款。\n\n确定预约车牌 ' + plate + ' 吗？')) return;

            const res = await post('/api/reservation/create', { license_plate: plate });
            if (res && res.ok) {
                const expireMin = window._expireMinutes || 30;
                showSuccess('alert-box', '预约成功！请在' + expireMin + '分钟内到达，预付费用不退。');
                document.getElementById('res-plate').value = '';
                loadReservations();
                loadStatus();
            } else {
                showError('alert-box', res?.data?.error || '预约失败');
            }
        }

        // Tab switching
        function switchReservationTab(tab, ev) {
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            if (ev && ev.target) ev.target.classList.add('active');
            document.getElementById('tab-active-reservations').classList.toggle('hidden', tab !== 'active');
            document.getElementById('tab-history-reservations').classList.toggle('hidden', tab !== 'history');
            if (tab === 'history') {
                const today = new Date().toISOString().split('T')[0];
                const d30 = new Date(Date.now() - 29*86400000).toISOString().split('T')[0];
                if (!document.getElementById('hist-start').value) document.getElementById('hist-start').value = d30;
                if (!document.getElementById('hist-end').value) document.getElementById('hist-end').value = today;
                loadHistory();
            }
        }

        // Load history
        async function loadHistory() {
            const start = document.getElementById('hist-start').value || '';
            const end = document.getElementById('hist-end').value || '';
            const params = new URLSearchParams();
            if (start) params.set('start', start);
            if (end) params.set('end', end);
            const res = await get('/api/reservation/history?' + params.toString());
            const tbody = document.getElementById('history-table');
            if (!res || !res.ok) { tbody.innerHTML = '<tr><td colspan="6">加载失败</td></tr>'; return; }
            const list = res.data.reservations || [];
            if (!list.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:#999">暂无历史记录</td></tr>'; return; }
            const statusBadge = {
                'completed': 'badge-success', 'expired': 'badge-warning', 'cancelled': 'badge-danger'
            };
            const statusLabel = {
                'completed': '已完成', 'expired': '已过期', 'cancelled': '已取消'
            };
            tbody.innerHTML = list.map(r => '<tr>' +
                '<td>' + r.id + '</td>' +
                '<td><strong>' + r.license_plate + '</strong></td>' +
                '<td>' + r.P_name + '</td>' +
                '<td><span class="badge ' + (statusBadge[r.status] || 'badge-default') + '">' + (statusLabel[r.status] || r.status) + '</span></td>' +
                '<td>¥' + parseFloat(r.prepaid).toFixed(2) + '</td>' +
                '<td>' + formatDateTime(r.created_at) + '</td>' +
            '</tr>').join('');
        }

        // Cancel reservation
        async function cancelReservation(id) {
            if (!confirm('确定要取消此预约吗？\n\n预付费用将不予退还。')) return;
            const res = await del('/api/reservation/' + id);
            if (res && res.ok) {
                showSuccess('alert-box', '预约已取消（预付不退）');
                loadReservations();
                loadStatus();
            } else {
                showError('alert-box', res?.data?.error || '取消失败');
            }
        }

        // Enter key
        document.getElementById('res-plate')?.addEventListener('keydown', e => {
            if (e.key === 'Enter') createReservation();
        });

        // Store last fetched reservations for client-side countdown
        let _reservations = [];
        let _reservationExpireMs = 30 * 60 * 1000;

        function updateCountdowns() {
            const now = Date.now();
            let needRefresh = false;
            const rows = document.querySelectorAll('#reservations-table tr[data-expire-ms]');
            rows.forEach(row => {
                const expireMs = parseInt(row.dataset.expireMs);
                const remain = Math.max(0, expireMs - now);
                const totalSec = Math.floor(remain / 1000);
                const mins = Math.floor(totalSec / 60);
                const secs = totalSec % 60;
                const badge = row.querySelector('.countdown-badge');
                if (badge) {
                    if (remain <= 0) {
                        badge.textContent = '已过期';
                        badge.className = 'badge badge-danger countdown-badge';
                        needRefresh = true;
                    } else {
                        badge.textContent = mins + ':' + String(secs).padStart(2, '0');
                        if (remain < 5 * 60 * 1000) {
                            badge.className = 'badge reservation-urgent countdown-badge';
                        } else {
                            badge.className = 'badge badge-success countdown-badge';
                        }
                    }
                }
            });
            if (needRefresh) { loadReservations(); loadStatus(); }
        }

        // Override loadReservations to store data and use per-second countdown
        loadReservations = async function() {
            const res = await get('/api/reservation/list');
            const tbody = document.getElementById('reservations-table');
            if (!res || !res.ok) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">加载失败</td></tr>';
                _reservations = [];
                return;
            }
            const list = res.data.reservations || [];
            _reservations = list;
            _reservationExpireMs = (window._expireMinutes || 30) * 60 * 1000;
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999">暂无预约</td></tr>';
                return;
            }
            const now = Date.now();
            tbody.innerHTML = list.map(r => {
                const created = new Date(r.created_at.replace(' ', 'T'));
                const expireMs = created.getTime() + _reservationExpireMs;
                const remain = Math.max(0, expireMs - now);
                const totalSec = Math.floor(remain / 1000);
                const mins = Math.floor(totalSec / 60);
                const secs = totalSec % 60;
                const badgeClass = remain <= 0 ? 'badge-danger' : remain < 5*60*1000 ? 'reservation-urgent' : 'badge-success';
                const badgeText = remain <= 0 ? '已过期' : mins + ':' + String(secs).padStart(2, '0');
                return '<tr data-expire-ms="' + expireMs + '">' +
                    '<td>' + r.id + '</td>' +
                    '<td><strong>' + r.license_plate + '</strong></td>' +
                    '<td>' + r.P_name + '</td>' +
                    '<td>' + formatDateTime(r.created_at) + '</td>' +
                    '<td><span class="badge ' + badgeClass + ' countdown-badge">' + badgeText + '</span></td>' +
                    '<td><button class="btn btn-danger btn-sm" onclick="cancelReservation(' + r.id + ')">取消</button></td>' +
                '</tr>';
            }).join('');
        };

        // Init
        loadStatus();
        loadReservations();

        // Status refresh every 10s; countdown updates every 1s
        setInterval(() => { loadStatus(); loadReservations(); }, 10000);
        setInterval(() => { updateCountdowns(); }, 1000);
    </script>
</body>
</html>
