<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>个人中心 - Smart Parking</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<div class="app-container">
<div class="sidebar">
<div class="sidebar-logo"><h2>Smart Parking</h2><p>智慧停车管理系统</p></div>
<div class="sidebar-nav">
<a class="nav-item" id="nav-dashboard" href="/dashboard.html"><span class="icon">&#9776;</span> 主面板</a>
<a class="nav-item" id="nav-vehicles" href="/vehicles.html"><span class="icon">&#128663;</span> 车辆信息</a>
<a class="nav-item" id="nav-admin" href="/admin.html"><span class="icon">&#128100;</span> 管理页面</a>
<a class="nav-item" id="nav-reservation" href="/reservation.html"><span class="icon">&#128197;</span> 预约管理</a>
<a class="nav-item active" id="nav-profile" href="/profile.html"><span class="icon">&#128101;</span> 个人中心</a>
</div>
<div class="sidebar-footer">
<div class="user-info"><div class="user-avatar">U</div><div><div class="user-name">用户</div><div class="user-role">普通用户</div></div></div>
<button class="btn btn-default btn-sm btn-block" onclick="logout()">退出登录</button>
</div>
</div>
<div class="main-content">
<div class="page-header"><h1>个人中心</h1><p>查看和管理您的账户信息</p></div>
<div id="alert-box"></div>

<div class="row">
<div class="col-2">
<div class="card"><div class="card-title">个人信息</div>
<div class="form-group"><label>用户名</label><input type="text" id="prof-username" class="form-control" readonly></div>
<div class="form-group"><label>手机号</label><input type="text" id="prof-phone" class="form-control"></div>
<div class="form-group"><label>真实姓名</label><input type="text" id="prof-truename" class="form-control"></div>
<div class="form-group"><label>角色</label><input type="text" id="prof-role" class="form-control" readonly></div>
<button class="btn btn-primary btn-sm" onclick="updateProfile()">保存修改</button>
</div>
<div class="card"><div class="card-title">修改密码</div>
<div class="form-group"><label>新密码</label><input type="password" id="prof-new-pass" class="form-control" placeholder="留空则不修改"></div>
<button class="btn btn-primary btn-sm" onclick="updateProfile()">更新密码</button>
</div>
</div>
<div class="col-1">
<div class="card"><div class="card-title">我的余额 <span id="prof-balance" style="color:#ff4d4f;font-weight:bold">¥0.00</span></div>
<div id="prof-transactions" style="max-height:250px;overflow-y:auto"></div>
</div>
<div class="card"><div class="card-title">我的月卡</div><div id="prof-passes"><p style="color:#999">加载中...</p></div></div>
</div>
</div>
</div>
</div>
<script src="/js/common.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
